<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Irrig'App — Hors ligne</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #1a2e1a;
      color: #c8e6c9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 24px;
      opacity: 0.7;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
    }

    p {
      font-size: 0.95rem;
      color: #81c784;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="icon pulse">🌿</div>
  <h1>Hors connexion</h1>
  <p>Impossible de joindre le serveur. Retournez sur l'application pour consulter les dernières données enregistrées.</p>
  <a class="btn" href="index.html">← Retour à l'app</a>
</body>
</html>
